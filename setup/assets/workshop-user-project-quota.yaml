apiVersion: v1
kind: ResourceQuota
metadata:
  name: workshop-quota
spec:
  hard:
    pods: '10'
    requests.cpu: '2'
    requests.memory: 4Gi
    limits.cpu: '4'
    limits.memory: 8Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: workshop-limits
spec:
  limits:
  - type: Container
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 200m
      memory: 256Mi