# jenkins-values.yaml
# Jenkins Helm chart values for the workshop environment.
#
# Usage:
#   helm install jenkins jenkins/jenkins -f jenkins-values.yaml -n jenkins --wait --timeout 10m
controller:
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  admin:
    username: admin
  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - credentials-binding:latest
    - junit:latest
    - ansicolor:latest
  service:
    type: ClusterIP
  serviceAccount:
    create: true
    name: jenkins
  JCasC:
    enabled: true
    overwriteConfiguration: true
    configScripts:
      workshop-auth: |
        jenkins:
          numExecutors: 0
          securityRealm:
            local:
              allowsSignup: false
              users:
                - id: "user01"
                  password: "user01"
                # ── PASTE GENERATED USERS HERE ────────────────────────────────────────
                # Run: uv run scripts/generate-jenkins-users.py 20 --password Workshop2024!
                # and paste the output here. Example:
                #
                # - id: "user1"
                #   password: "user01Workshop2024!"
                # - id: "user2"
                #   password: "user02Workshop2024!"
                # ─────────────────────────────────────────────────────────────────────
          authorizationStrategy:
            loggedInUsersCanDoAnything:
              allowAnonymousRead: false
        unclassified:
          location:
            url: "https://jenkins-jenkins.<your-cluster-domain>/"

persistence:
  enabled: true
  size: 20Gi


