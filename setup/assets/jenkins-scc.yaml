# jenkins-scc.yaml
# Grants the jenkins ServiceAccount permission to run as UID 1000 on OpenShift.
#
# OpenShift's default restricted-v2 SCC does not allow containers to run as
# UID 1000. The Jenkins container image requires UID 1000. This ClusterRoleBinding
# grants the anyuid SCC to the jenkins ServiceAccount, allowing it.
#
# Apply this BEFORE running helm install:
#   oc apply -f manifests/jenkins-scc.yaml
#
# This must be applied by a user with cluster-admin rights.
# The binding references the ServiceAccount by name — it does not need to exist
# yet. When Helm creates the ServiceAccount during install, the binding takes
# effect immediately with no race condition.
#
# This file is safe to commit — it contains no secrets.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-anyuid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins
